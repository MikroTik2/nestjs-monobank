name: release library

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Build & Publish nestjs-monobank
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
    
    steps:
      - name: checkout repo
      - uses: actions/checkout@v3

      - name: set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: set up node.js
        uses: actions/setup-node@v3
        with:
            node-version: 18
            registry-url: 'https://registry.npmjs.org/'
            cache: 'pnpm'

      - name: install
        run: pnpm install

      - name: build
        run: pnpm build:packages

      - name: verify npm package version availability
        id: check_version
        run: |
            VERSION=$(jq -r '.version' packages/nestjs-monobank/package.json)
            echo "Current package version: $VERSION"

            if npm view nestjs-monobank@$VERSION version > /dev/null 2>&1; then
              echo "Version $VERSION already exists on npm. Skipping publish."
              echo "should_publish=false" >> $GITHUB_OUTPUT
            else
              echo "Version $VERSION does not exist. Will publish."
              echo "should_publish=true" >> $GITHUB_OUTPUT
            fi

      - name: publish
        if: steps.check_version.outputs.should_publish == 'true'
        working-directory: packages/nestjs-monobank
        run: pnpm publish --access public
        env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      